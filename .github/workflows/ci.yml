name: Build, Version & Release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  actions: write

jobs:
  version:
    if: github.event.pull_request.merged == true
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if ! echo "$BRANCH" | grep -qE '^(feat|fix)/.+'; then
            echo "::error::Branch name '$BRANCH' does not match (feat|fix)/pattern. Aborting."
            exit 1
          fi
          echo "branch_type=$(echo "$BRANCH" | cut -d'/' -f1)" >> "$GITHUB_OUTPUT"
        id: branch

      - name: Bump version
        id: version
        run: |
          LATEST=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            BRANCH_TYPE="${{ steps.branch.outputs.branch_type }}"
            if [ "$BRANCH_TYPE" = "feat" ]; then
              VERSION="$MAJOR.$((MINOR + 1)).0"
            else
              VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
            exit 1
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

    outputs:
      version: ${{ steps.version.outputs.version }}

  build:
    if: github.event.pull_request.merged == true
    needs: version
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project ZAILimitsMonitor.xcodeproj \
            -scheme ZAILimitsMonitor \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            MARKETING_VERSION="${{ needs.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ needs.version.outputs.version }}"

      - name: Archive .app
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/ZAILimitsMonitor.app dist/
          cd dist
          zip -r ZAILimitsMonitor.zip ZAILimitsMonitor.app

      - uses: actions/upload-artifact@v4
        with:
          name: app-archive
          path: dist/ZAILimitsMonitor.zip

  release:
    if: github.event.pull_request.merged == true
    needs: [version, build]
    runs-on: macos-26
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-archive
          path: dist

      - name: Get SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 dist/ZAILimitsMonitor.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: dist/ZAILimitsMonitor.zip
          generate_release_notes: true

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_PAT }}
          repository: DmitryReztsov/homebrew-tap
          event-type: update-cask
          client-payload: '{"version": "${{ needs.version.outputs.version }}", "sha256": "${{ steps.sha.outputs.sha256 }}"}'
