name: Build, Version & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  version:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          LATEST=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" ZAILimitsMonitor/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" ZAILimitsMonitor/Info.plist

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ZAILimitsMonitor/Info.plist
          git commit -m "Bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
            exit 1
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

    outputs:
      version: ${{ steps.version.outputs.version }}

  build:
    needs: version
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project ZAILimitsMonitor.xcodeproj \
            -scheme ZAILimitsMonitor \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual

      - name: Archive .app
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/ZAILimitsMonitor.app dist/
          cd dist
          zip -r ZAILimitsMonitor.zip ZAILimitsMonitor.app

      - uses: actions/upload-artifact@v4
        with:
          name: app-archive
          path: dist/ZAILimitsMonitor.zip

  release:
    needs: [version, build]
    runs-on: macos-26
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-archive
          path: dist

      - name: Get SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 dist/ZAILimitsMonitor.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: dist/ZAILimitsMonitor.zip
          generate_release_notes: true

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_PAT }}
          repository: DmitryReztsov/homebrew-tap
          event-type: update-cask
          client-payload: '{"version": "${{ needs.version.outputs.version }}", "sha256": "${{ steps.sha.outputs.sha256 }}"}'
