name: ZAILimitsMonitor
options:
  bundleIdPrefix: com.zailimits
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.5"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ZAILimitsMonitor:
    type: application
    platform: macOS
    sources:
      - ZAILimitsMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zailimits.app
        INFOPLIST_FILE: ZAILimitsMonitor/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1.3.1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
